<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000044"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Glassmorphism shine overlay -->
  <rect width="100" height="50" rx="22" ry="22" fill="url(#shine)"/>

  <!-- MP text -->
  <text
    x="50"
    y="64"
    text-anchor="middle"
    font-family="'Segoe UI', 'Inter', 'Arial', sans-serif"
    font-size="38"
    font-weight="700"
    fill="white"
    filter="url(#shadow)"
    letter-spacing="-1"
  >MP</text>
</svg>
